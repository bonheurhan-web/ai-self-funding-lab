name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: projects/micro-dev-tools/package-lock.json
      - run: npm ci
        working-directory: projects/micro-dev-tools
      - run: npm run lint
        working-directory: projects/micro-dev-tools
      - run: npm test
        working-directory: projects/micro-dev-tools
      - run: npm run build
        working-directory: projects/micro-dev-tools
