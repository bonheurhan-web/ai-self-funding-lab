name: Portfolio CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  company-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run validate:dashboard
      - name: Verify company structure
        shell: bash
        run: |
          test -f docs/MISSION.md
          test -f docs/VISION.md
          test -f docs/ENGINEERING.md
          test -f docs/AUTOMATION.md
          test -f docs/DECISION.md
          test -f docs/METRICS.md
          test -f docs/PROJECT_TEMPLATE.md
          test -f dashboard/project.schema.json
          test -f projects/_template/PROJECT.md

  micro-dev-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: projects/micro-dev-tools/package-lock.json
      - run: npm ci
        working-directory: projects/micro-dev-tools
      - run: npm run lint
        working-directory: projects/micro-dev-tools
      - run: npm test
        working-directory: projects/micro-dev-tools
      - run: npm run build
        working-directory: projects/micro-dev-tools

  ai-workflow-library:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run validate:dashboard
      - run: npm run build
      - run: npm run test
